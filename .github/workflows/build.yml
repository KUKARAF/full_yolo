name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write   # needed for release uploads

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: full-yolo-linux-x86_64
            ext: ""

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: full-yolo-linux-arm64
            ext: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: full-yolo-macos-arm64
            ext: ""

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: full-yolo-macos-x86_64
            ext: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: full-yolo-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so git rev-parse --short HEAD works

      - name: Get short SHA
        id: sha
        shell: bash
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Static musl builds require the cross-compilation toolchain
      - name: Install musl tools (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install aarch64 musl cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        env:
          GIT_SHA: ${{ steps.sha.outputs.short }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/full-yolo${{ matrix.ext }}" \
             "${{ matrix.artifact }}${{ matrix.ext }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}

      # On version tags (v0.1, v1.2, …) attach the binary to a GitHub release
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}${{ matrix.ext }}
          # Release name = tag name (e.g. "v0.1")
          name: ${{ github.ref_name }}
          # Generate release notes from commits since the previous tag
          generate_release_notes: true
